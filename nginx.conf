server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Sécurité de base — `always` garantit l'ajout même sur 4xx/5xx,
  # mais dès qu'un sous-bloc `location` déclare un `add_header`, ces
  # directives ne sont pas héritées : on les réplique partout via le map.
  server_tokens off;

  # Headers de sécurité : définis dans chaque bloc location pour éviter
  # l'écrasement par les add_header internes (nginx ne hérite pas).
  #
  # Content-Security-Policy :
  # - script-src : self uniquement (Vite produit du JS bundle, pas d'inline)
  #   'unsafe-inline' gardé pour compat React hydratation
  # - style-src : self + Google Fonts CSS (inline pour Tailwind JIT)
  # - img-src : self + data/blob + Supabase + Google (avatars, Photos)
  #   `https:` en fallback pour images embarquées légitimes (PJ scrapées, etc.)
  # - connect-src : restrictif (Supabase + Pappers uniquement) — protection
  #   contre exfiltration de données vers domaines attaquants
  # - frame-ancestors : self uniquement (anti-clickjacking)
  set $csp "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: ; media-src 'self' blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.pappers.fr https://www.googleapis.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'";

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-font-ttf
    font/opentype
    image/svg+xml;

  # Assets immuables hashés par Vite (xxx.[hash].js) → cache long
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp always;
    try_files $uri =404;
  }

  # Fichiers statiques courants
  location ~* \.(?:ico|gif|jpg|jpeg|png|webp|svg|woff|woff2|ttf|otf|eot)$ {
    expires 30d;
    add_header Cache-Control "public" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # SPA fallback — toutes les routes inconnues servent index.html
  # (React Router gère le routing côté client)
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp always;
    try_files $uri $uri/ /index.html;
  }

  # Désactive l'accès aux fichiers cachés
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}

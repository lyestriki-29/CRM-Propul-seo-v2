server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Sécurité de base
  server_tokens off;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/x-font-ttf
    font/opentype
    image/svg+xml;

  # Assets immuables hashés par Vite (xxx.[hash].js) → cache long
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Fichiers statiques courants
  location ~* \.(?:ico|gif|jpg|jpeg|png|webp|svg|woff|woff2|ttf|otf|eot)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback — toutes les routes inconnues servent index.html
  # (React Router gère le routing côté client)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Désactive l'accès aux fichiers cachés
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}

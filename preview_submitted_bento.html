<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Brief Déjà Soumis / Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background: #fff;
      border-radius: 32px;
      padding: 64px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 60px rgba(99,102,241,0.10);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    p {
      color: #64748b;
      line-height: 1.7;
      font-size: 16px;
    }
    .footer {
      margin-top: 40px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.4em;
    }

    /* Version "Confirmation après submit" */
    .toggle-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .label-badge {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #0f172a;
      color: #94a3b8;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="label-badge" id="mode-label">Mode : Déjà soumis</div>
  <button class="toggle-btn" onclick="toggle()">Voir confirmation</button>

  <div class="card" id="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>
    <div class="tag">Brief reçu</div>
    <h1 id="title">DÉJÀ TRANSMIS.</h1>
    <p id="body">Votre brief a bien été reçu par l'équipe Propulseo.<br>Nous reviendrons vers vous très prochainement.</p>
    <div class="footer">Propulseo Studio · Excellence Digitale</div>
  </div>

  <script>
    let isConfirm = false;
    function toggle() {
      isConfirm = !isConfirm;
      const btn = document.querySelector('.toggle-btn');
      const label = document.getElementById('mode-label');
      const title = document.getElementById('title');
      const body = document.getElementById('body');
      if (isConfirm) {
        btn.textContent = 'Voir déjà soumis';
        label.textContent = 'Mode : Confirmation';
        title.textContent = 'MERCI !';
        body.innerHTML = "Votre brief est entre les mains de nos experts.<br>Nous vous recontactons sous <strong>24h</strong>.";
      } else {
        btn.textContent = 'Voir confirmation';
        label.textContent = 'Mode : Déjà soumis';
        title.textContent = 'DÉJÀ TRANSMIS.';
        body.innerHTML = "Votre brief a bien été reçu par l'équipe Propulseo.<br>Nous reviendrons vers vous très prochainement.";
      }
    }
  </script>
</body>
</html>
